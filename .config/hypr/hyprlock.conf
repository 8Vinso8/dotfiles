general {
  disalbe_loading_bar = true
  hide_cursor = true
  grace = 0
  ignore_empty_input = true
}

background {
  path = screenshot
  blur_passes = 2
  brightness = 0.2
}

input-field {
  outline_thickness = 0
  size = 400, 80
  inner_color = rgba(0, 0, 0, 0.2) # no fill
  check_color = rgba(0, 0, 0, 0.0)
  placeholder_text = 
  font_color = rgb(160, 160, 160)
  fade_on_empty = false
  rounding = 50

  position = 0, 0
  halign = center
  valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(200, 200, 200, 0.8)
    font_size = 200

    position = 0, 300
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] playerctl status && playerctl -p spotify metadata -f "{{ artist }}: {{ title }}"
    color = rgba(200, 200, 200, 0.8)
    font_size = 18

    position = 0, 25
    halign = center
    valign = bottom
}
